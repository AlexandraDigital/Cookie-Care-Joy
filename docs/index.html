      // ---------------------------
      // App root
      // ---------------------------
      const App = () => {
        const [language,setLanguage] = React.useState("en");
        const [tasks,setTasks] = React.useState([]);
        const [cookies,setCookies] = React.useState(0);
        const [achievements,setAchievements] = React.useState([]);
        const [selectedDate,setSelectedDate] = React.useState(new Date());
        const [showWindDown,setShowWindDown] = React.useState(false);
        const [showBackup,setShowBackup] = React.useState(false);

        // ---------------------------
        // Example complete task function
        // ---------------------------
        const completeTask = (taskName) => {
          setTasks(prev=>[...prev,taskName]);
          setCookies(prev=>prev+1);
          setAchievements(prev=>[...prev,`Completed: ${taskName}`]);
        };

        // ---------------------------
        // WindDown Modal
        // ---------------------------
        const WindDownModal = ({show,onClose})=>{
          if(!show) return null;
          return (
            <div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",background:"rgba(0,0,0,0.5)",display:"flex",justifyContent:"center",alignItems:"center"}}>
              <div style={{background:"#fff",padding:"1rem",borderRadius:"10px",width:"90%",maxWidth:"400px"}}>
                <h2>{strings[language].windDownTitle}</h2>
                {strings[language].exercises.map((ex,i)=>(
                  <div key={i} style={{margin:"0.5rem 0",border:"1px solid #ccc",borderRadius:"8px",padding:"0.5rem"}}>
                    <h3>{ex.name}</h3>
                    <p>{ex.desc}</p>
                    <button onClick={()=>alert(`${ex.name} started!`)}>{strings[language].start}</button>
                  </div>
                ))}
                <button onClick={onClose} style={{marginTop:"0.5rem"}}>{strings[language].close}</button>
              </div>
            </div>
          );
        };

        // ---------------------------
        // Data Backup Modal
        // ---------------------------
        const DataBackupModal = ({show,onClose})=>{
          if(!show) return null;
          const saveData = ()=>{
            const data = { tasks,cookies,achievements };
            const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a"); a.href=url; a.download="backup.json"; a.click();
          };
          const loadData = ()=>{
            const input = document.createElement("input");
            input.type="file"; input.accept=".json";
            input.onchange = (e)=>{
              const file = e.target.files[0]; 
              const reader = new FileReader();
              reader.onload = (ev)=>{
                const loaded = JSON.parse(ev.target.result);
                setTasks(loaded.tasks||[]); setCookies(loaded.cookies||0); setAchievements(loaded.achievements||[]);
              };
              reader.readAsText(file);
            };
            input.click();
          };
          const resetNotifications = ()=>{
            Notification.requestPermission().then(p=>alert("Notification permission: "+p));
          };
          return (
            <div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",background:"rgba(0,0,0,0.5)",display:"flex",justifyContent:"center",alignItems:"center"}}>
              <div style={{background:"#fff",padding:"1rem",borderRadius:"10px",width:"90%",maxWidth:"400px"}}>
                <h2>{strings[language].saveHeader}</h2>
                <p>{strings[language].saveDesc}</p>
                <button onClick={saveData}>{strings[language].saveButton}</button>
                <button onClick={loadData}>{strings[language].loadButton}</button>
                <button onClick={resetNotifications}>{strings[language].resetNotif}</button>
                <button onClick={onClose} style={{marginTop:"0.5rem"}}>{strings[language].close}</button>
              </div>
            </div>
          );
        };

        // ---------------------------
        // SelfCare Panel
        // ---------------------------
        const SelfCarePanel = ()=>{
          const [quote,setQuote] = React.useState(strings[language].quote);
          const [selfTasks,setSelfTasks] = React.useState([]);
          const handleNewQuote = ()=>{
            const quotes = [
              "\"Your body is not a burden, it's your home.\" — Unknown",
              "\"Self-care is how you take your power back.\" — Lalah Delia",
              "\"Caring for yourself is not self-indulgence.\" — Audre Lorde"
            ];
            setQuote(quotes[Math.floor(Math.random()*quotes.length)]);
          };
          const handleAddTask = (idea)=>{
            setSelfTasks(prev=>[...prev,idea]);
          };
          return (
            <div style={{border:"1px solid #d63384",borderRadius:"10px",padding:"1rem",margin:"1rem 0"}}>
              <h2>{strings[language].selfCareTitle}</h2>
              <p>{strings[language].selfCareDesc}</p>
              <blockquote>{quote}</blockquote>
              <button onClick={handleNewQuote}>{strings[language].newQuote}</button>
              <button>{strings[language].todaysSelfCare}</button>
              <button>{strings[language].chooseActivity}</button>
              <p>{selfTasks.length===0 ? strings[language].noTasks : selfTasks.map((t,i)=><span key={i}>{t}<br/></span>)}</p>
              <h3>💡 Self-Care Ideas</h3>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"0.5rem"}}>
                {strings[language].selfCareIdeas.map((idea,i)=>(
                  <button key={i} onClick={()=>handleAddTask(idea)}>{idea}</button>
                ))}
              </div>
            </div>
          );
        };

        // ---------------------------
        // CookieJar Panel
        // ---------------------------
        const CookieJarPanel = ()=>{
          const nextTrophy = 100 - (cookies%100);
          return (
            <div style={{border:"1px solid #d63384",borderRadius:"10px",padding:"1rem",margin:"1rem 0"}}>
              <h2>{strings[language].cookieJarTitle}</h2>
              <p>{strings[language].cookieJarDesc}</p>
              <p>{strings[language].trophyInfo}</p>
              <h3>{cookies} {strings[language].cookiesEarned}</h3>
              <p>{strings[language].completeTasks}</p>
              <p>{strings[language].nextTrophy} {nextTrophy}</p>
              <h3>{strings[language].recentAchievements}</h3>
              {achievements.length===0 ? <p>{strings[language].achievementsDesc}</p> :
                <ul>{achievements.map((a,i)=><li key={i}>{a}</li>)}</ul>}
            </div>
          );
        };

        // ---------------------------
        // Bakery Shop Panel
        // ---------------------------
        const BakeryShopPanel = ()=>{
          return (
            <div style={{border:"1px solid #d63384",borderRadius:"10px",padding:"1rem",margin:"1rem 0"}}>
              <h2>{strings[language].bakeryTitle}</h2>
              <p>{strings[language].bakeryDesc}</p>

              {/* Basic Plan */}
              <div style={{border:"1px solid #ccc",padding:"0.5rem",borderRadius:"8px",margin:"0.5rem 0"}}>
                <h3>{strings[language].basicPlan}</h3>
                <p>{strings[language].basicPrice}</p>
                <ul>{strings[language].basicFeatures.map((f,i)=><li key={i}>{f}</li>)}</ul>
                <strong>{strings[language].basicLabel}</strong>
              </div>

              {/* Golden Plan */}
              <div style={{border:"2px solid gold",padding:"0.5rem",borderRadius:"8px",margin:"0.5rem 0",background:"#fffbe6"}}>
                <h3>{strings[language].goldenPlan} ⭐ BEST VALUE</h3>
                <p>{strings[language].goldenPrice}</p>
                <ul>{strings[language].goldenFeatures.map((f,i)=><li key={i}>{f}</li>)}</ul>
                <button>{strings[language].pay}</button>
                <p>{strings[language].codeEntry}</p>
              </div>
            </div>
          );
        };

        // ---------------------------
        // Main render
        // ---------------------------
        return (
          <div>
            {/* Navigation */}
            <div className="nav">
              <button onClick={()=>setLanguage("en")}>🇬🇧 EN</button>
              <button onClick={()=>setLanguage("es")}>🇪🇸 ES</button>
              <button onClick={()=>setLanguage("zh")}>🇨🇳 ZH</button>
              <span style={{marginLeft:"1rem"}}>{strings[language].home}</span>
              <button onClick={()=>setShowWindDown(true)}>{strings[language].windDown}</button>
              <button onClick={()=>setShowBackup(true)}>{strings[language].save}</button>
            </div>

            {/* Sections */}
            <div className="section">
              <SelfCarePanel />
              <CookieJarPanel />
              <BakeryShopPanel />
            </div>

            {/* Modals */}
            <WindDownModal show={showWindDown} onClose={()=>setShowWindDown(false)} />
            <DataBackupModal show={showBackup} onClose={()=>setShowBackup(false)} />
          </div>
        );
      };

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);

    </script>
