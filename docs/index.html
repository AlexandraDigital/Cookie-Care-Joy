<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cookie Care Joy</title>
<style>
  body { margin:0; padding:0; font-family:system-ui; }
  .page-root { position: relative; min-height: 100vh; }
  .night-overlay { position: fixed; inset:0; background: rgba(0,0,0,0.05); pointer-events:none; }
  @keyframes slideDown { 0% { transform: translateY(-100%);} 100%{ transform: translateY(0);}}
  @keyframes btnPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">

// ── CONSTANTS ─────────────────────────────────────────────
const ROSE="#f43f6e", GOLD="#f59e0b", WHITE="#fff", DARK="#1f2937", GRAY="#6b7280";
const cookieIcon = "data:image/svg+xml," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="22" fill="#f43f6e"/><text y="72" x="50" text-anchor="middle" font-size="62">🍪</text></svg>');
const TRANSLATIONS={en:{
  btn_wind_down:"WIND DOWN",
  notif_prompt:"Enable notifications for motivational reminders",
  notif_enable_short:"Enable",
  notif_on_msg:"Motivational reminders are on!",
  notif_turn_off:"Turn off",
  notif_turn_on:"Turn on",
  trophy_earned:"Trophy earned!",
  collected_100:"You collected 100 cookies",
  you_now_have:"You now have",
  baker_trophy:"trophy",
  baker_trophies:"trophies",
  keep_going:"Keep going!"
}};

const caringMsgs=[
  "time to take care of yourself 🍪",
  "your future self is rooting for you 🌸",
  "one sweet step at a time 💕",
  "you deserve to follow through ✨",
  "every task done is a cookie earned 🍪",
  "showing up for yourself is the whole point 🌟",
  "soft reminder: you matter, and so does this 🌸",
  "you are doing better than you think 💖",
  "baking good habits, one task at a time 🍪",
  "You're already doing better than you think 💖",
  "This reminder comes with a hug 🤗 Now go crush it!",
  "Progress over perfection — you've got this 🌈",
  "Your consistency is your superpower ⚡",
  "You deserve to follow through for yourself 🌸",
  "Every task you complete is an act of self-love 🍪"
];

// ── HELPER FUNCTIONS ─────────────────────────────────────
const fmtTime=d=>{const hh=d.getHours(),mm=d.getMinutes();return `${String(hh%12||12).padStart(2,"0")}:${String(mm).padStart(2,"0")} ${hh>=12?"PM":"AM"}`;}
const parseAlertTimeMs=(alertTime,dateStr)=>{const m=alertTime&&alertTime.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);if(!m)return null;let h=parseInt(m[1],10),min=parseInt(m[2],10);if(m[3].toUpperCase()==="PM"&&h!==12)h+=12;if(m[3].toUpperCase()==="AM"&&h===12)h=0;const d=new Date(dateStr+"T"+String(h).padStart(2,"0")+":"+String(min).padStart(2,"0")+":00");return isNaN(d.getTime())?null:d.getTime();}
async function swNotify(title,opts){if(Notification.permission!=="granted")return;try{if("serviceWorker" in navigator){const reg=await navigator.serviceWorker.ready;await reg.showNotification(title,opts);}else{new Notification(title,opts);}}catch(_){try{new Notification(title,opts);}catch(_){} }}

// ── APP COMPONENT ─────────────────────────────────────────
function App(){
  const [lang,setLang]=React.useState(localStorage.getItem("ccj_lang")||"en");
  const t=TRANSLATIONS[lang]||TRANSLATIONS.en;

  const [cookies,setCookies]=React.useState(()=>JSON.parse(localStorage.getItem("ccj_cookies")||"0"));
  const [tasks,setTasks]=React.useState(()=>JSON.parse(localStorage.getItem("ccj_tasks")||"[]"));
  const [alarmTask,setAlarmTask]=React.useState(null);
  const [snoozed,setSnoozed]=React.useState({});
  const [notifPerm,setNotifPerm]=React.useState(Notification.permission);
  const [welcomeBack,setWelcomeBack]=React.useState(true);

  const reminderSentRef=React.useRef({day:"",set:new Set()});
  const firedAlarmsRef=React.useRef([]);
  const motivationIntervalRef=React.useRef(null);

  React.useEffect(()=>{localStorage.setItem("ccj_cookies",JSON.stringify(cookies));},[cookies]);
  React.useEffect(()=>{localStorage.setItem("ccj_tasks",JSON.stringify(tasks));},[tasks]);
  React.useEffect(()=>{localStorage.setItem("ccj_lang",lang);},[lang]);

  const startMotivationReminder=()=>{
    if(motivationIntervalRef.current)return;
    setTimeout(()=>{
      if(Notification.permission==="granted"){const msg=caringMsgs[Math.floor(Math.random()*caringMsgs.length)];swNotify("Cookie-Care-Joy 🍪",{body:msg,icon:cookieIcon});}
    },4000);
    motivationIntervalRef.current=setInterval(()=>{
      if(Notification.permission!=="granted")return;
      const msg=caringMsgs[Math.floor(Math.random()*caringMsgs.length)];
      swNotify("Cookie-Care-Joy 🍪",{body:msg,icon:cookieIcon});
    },30*60*1000);
  };
  React.useEffect(()=>{if(Notification.permission==="granted"&&localStorage.getItem("ccj_notif_on")==="true")startMotivationReminder();},[]);

  const handleSnooze=()=>{if(!alarmTask)return;setSnoozed(s=>({...s,[alarmTask.id]:Date.now()+5*60*1000}));setAlarmTask(null);}
  const handleAlarmDone=()=>{if(!alarmTask)return;setCookies(c=>c+1);setTasks(prev=>prev.map(t=>t.id===alarmTask.id?{...t,done:true}:t));setSnoozed(s=>{const n={...s};delete n[alarmTask.id];return n;});setAlarmTask(null);}

  React.useEffect(()=>{
    const checkAlarms=()=>{
      const now=new Date();
      const todayStr=now.toISOString().split("T")[0];
      const nowStr=fmtTime(now);
      const nowMs=now.getTime();
      if(reminderSentRef.current.day!==todayStr){reminderSentRef.current.day=todayStr;reminderSentRef.current.set.clear();}
      const firedSet=new Set(firedAlarmsRef.current);

      // 2-min reminder
      for(const task of tasks){
        if(task.date!==todayStr||!task.alertTime||task.alertTime==="NOW")continue;
        const alarmMs=parseAlertTimeMs(task.alertTime,todayStr);if(alarmMs==null)continue;
        const key=task.id+"_"+task.alertTime;
        if(reminderSentRef.current.set.has(key))continue;
        if(nowMs>=alarmMs-2*60*1000&&nowMs<alarmMs){reminderSentRef.current.set.add(key);swNotify("Cookie-Care-Joy 🍪",{body:"In 2 minutes: "+(task.text||"Task"),icon:cookieIcon});}
      }

      // alarm firing
      let firing=null;
      for(const task of tasks){
        if(task.date!==todayStr||!task.alertTime||task.alertTime==="NOW")continue;
        if(task.alertTime!==nowStr)continue;
        if(firedSet.has(task.id+"_"+task.alertTime))continue;
        const until=snoozed[task.id];if(until!=null&&nowMs<until)continue;
        firing=task;break;
      }
      if(!firing)return;
      firedAlarmsRef.current=[...firedAlarmsRef.current,firing.id+"_"+firing.alertTime];
      setAlarmTask(firing);
      if("vibrate"in navigator)navigator.vibrate([400,200,400,200,800]);
    };
    const iv=setInterval(checkAlarms,3000);
    const warm=setTimeout(checkAlarms,1000);
    return ()=>{clearInterval(iv);clearTimeout(warm);}
  },[tasks,snoozed]);

  const requestNotifications=async()=>{
    if(!("Notification" in window))return alert("Browser does not support notifications");
    const result=await Notification.requestPermission();
    if(result==="granted"){localStorage.setItem("ccj_notif_on","true");startMotivationReminder();swNotify("Cookie-Care-Joy 🍪",{body:"You're all set! Sweet reminders on the way ✨",icon:cookieIcon});setNotifPerm("granted");}
  };

  return (
    <div className="page-root" style={{background:"#fdf6fb",padding:16}}>
      <h1>Cookie Care Joy 🍪</h1>
      {notifPerm!=="granted"&&<button onClick={requestNotifications} style={{padding:"8px 16px",borderRadius:12,border:"none",background:ROSE,color:"#fff",cursor:"pointer",fontWeight:700}}>Enable Notifications</button>}
      <div style={{marginTop:24}}><p>Cookies collected: {cookies}</p><button onClick={()=>setCookies(c=>c+1)} style={{padding:"6px 12px",borderRadius:8,border:"none",background:GOLD,color:"#fff"}}>Earn a Cookie</button></div>
      <div style={{marginTop:24}}><p>Tasks:</p><ul>{tasks.map(t=><li key={t.id}>{t.text}</li>)}</ul></div>

      {alarmTask&&<div style={{position:"fixed",top:"20%",left:"50%",transform:"translateX(-50%)",background:WHITE,padding:24,borderRadius:12,boxShadow:"0 0 12px rgba(0,0,0,0.25)",zIndex:500}}>
        <p><strong>Alarm:</strong> {alarmTask.text}</p>
        <button onClick={handleSnooze} style={{marginRight:8}}>Snooze 5 min</button>
        <button onClick={handleAlarmDone}>Done</button>
      </div>}

      {/* Floating Wind Down button */}
      <button style={{position:"fixed",right:20,bottom:20,zIndex:400,padding:"12px 16px",borderRadius:18,border:"2px solid #fcd34d",background:"#fef9c3",cursor:"pointer",animation:"btnPulse 3s ease-in-out infinite"}}>{t.btn_wind_down}</button>
    </div>
  );
}

// ── ERROR BOUNDARY ─────────────────────────────────────────────
class AppErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false};}
  static getDerivedStateFromError(){return {hasError:true};}
  componentDidCatch(err,info){console.error('AppErrorBoundary',err,info);}
  render(){if(this.state.hasError)return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:24,background:'#fdf6fb',fontFamily:'system-ui',textAlign:'center'}}><div><p style={{fontSize:18,color:'#1f2937'}}>Something went wrong</p><p style={{fontSize:14,color:'#6b7280'}}>Refresh or try again later.</p><button onClick={()=>window.location.reload()} style={{padding:'10px 20px',fontSize:14,borderRadius:12,border:'none',background:ROSE,color:'#fff',cursor:'pointer',fontWeight:600}}>Refresh</button></div></div>;return this.props.children;}
}

// ── RENDER ROOT ───────────────────────────────────────────────
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<AppErrorBoundary><App /></AppErrorBoundary>);

// ── SERVICE WORKER ─────────────────────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register("/Cookie-Care-Joy/OneSignalSDKWorker.js")
    .then(()=>console.log("Service worker registered"))
    .catch(err=>console.error("SW failed:",err));
}

</script>
</body>
</html>
