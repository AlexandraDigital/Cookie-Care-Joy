<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cookie-Care-Joy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- React and Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0;">

<div id="root"></div>

<script type="text/babel">

// ── Motivation messages ──
const caringMsgs = [
  "time to take care of yourself 🍪",
  "your future self is rooting for you 🌸",
  "one sweet step at a time 💕",
  "you deserve to follow through ✨",
  "every task done is a cookie earned 🍪",
  "showing up for yourself is the whole point 🌟",
  "soft reminder: you matter, and so does this 🌸",
  "you are doing better than you think 💖",
  "baking good habits, one task at a time 🍪",
  "You're already doing better than you think 💖",
  "This reminder comes with a hug 🤗 Now go crush it!",
  "Progress over perfection — you've got this 🌈",
  "Your consistency is your superpower ⚡",
  "You deserve to follow through for yourself 🌸",
  "Every task you complete is an act of self-love 🍪",
];

const cookieIcon = ""; // optional icon URL

// ── Helper functions ──
const fmtTime = d => {
  const hh = d.getHours();
  const mm = d.getMinutes();
  return `${String(hh % 12 || 12).padStart(2,"0")}:${String(mm).padStart(2,"0")} ${hh>=12?"PM":"AM"}`;
};

const parseAlertTimeMs = (alertTime, dateStr) => {
  const m = alertTime && alertTime.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
  if (!m) return null;
  let h = parseInt(m[1],10);
  const min = parseInt(m[2],10);
  if (m[3].toUpperCase()==="PM" && h!==12) h+=12;
  if (m[3].toUpperCase()==="AM" && h===12) h=0;
  const d = new Date(dateStr + "T" + String(h).padStart(2,"0") + ":" + String(min).padStart(2,"0") + ":00");
  return isNaN(d.getTime()) ? null : d.getTime();
};

const swNotify = async (title, options) => {
  if (navigator.serviceWorker && navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({ type:"notify", title, options });
  } else {
    new Notification(title, options);
  }
};

// ── Error Boundary ──
class AppErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError:false }; }
  static getDerivedStateFromError() { return { hasError:true }; }
  componentDidCatch(err, info) { console.error('AppErrorBoundary', err, info); }
  render() {
    if (this.state.hasError) return (
      <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:24,background:'#fdf6fb',fontFamily:'system-ui',textAlign:'center'}}>
        <div>
          <p style={{fontSize:18,color:'#1f2937',marginBottom:8}}>Something went wrong</p>
          <p style={{fontSize:14,color:'#6b7280',marginBottom:16}}>Refresh the page or try again later.</p>
          <button onClick={()=>window.location.reload()} style={{padding:'10px 20px',fontSize:14,borderRadius:12,border:'none',background:'#f43f6e',color:'#fff',cursor:'pointer',fontWeight:600}}>Refresh</button>
        </div>
      </div>
    );
    return this.props.children;
  }
}

// ── CalendarPage + AddDayTask (with badges) ──
function CalendarPage({ tasks, setTasks, setCookies }) {
  const [selectedDate, setSelectedDate] = React.useState(new Date());

  const startOfMonth = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);
  const endOfMonth = new Date(selectedDate.getFullYear(), selectedDate.getMonth()+1, 0);
  const daysInMonth = endOfMonth.getDate();

  const changeMonth = (offset) => {
    const newDate = new Date(selectedDate.getFullYear(), selectedDate.getMonth()+offset, 1);
    setSelectedDate(newDate);
  };

  const fmtDate = d => d.toISOString().split("T")[0];
  const tasksForDay = d => tasks.filter(t=>t.date===fmtDate(d));

  const handleToggleDone = task => {
    setTasks(prev=>prev.map(t=>t.id===task.id?{...t,done:!t.done}:t));
    if (!task.done) setCookies(1);
  };

  const handleAddTask = (d,text) => {
    if (!text.trim()) return;
    const id = "calendar_"+Date.now();
    setTasks(prev=>[...prev,{id,text:text.trim(),done:false,date:fmtDate(d),alertTime:null}]);
  };

  const calendar = [];
  for(let i=1;i<=daysInMonth;i++) calendar.push(new Date(selectedDate.getFullYear(),selectedDate.getMonth(),i));

  const todayStr = fmtDate(new Date());

  return (
    <div style={{padding:16}}>
      <h2>Calendar 📅</h2>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:12,alignItems:"center"}}>
        <button onClick={()=>changeMonth(-1)} style={{cursor:"pointer"}}>◀️</button>
        <span style={{fontWeight:700}}>{selectedDate.toLocaleString("default",{month:"long",year:"numeric"})}</span>
        <button onClick={()=>changeMonth(1)} style={{cursor:"pointer"}}>▶️</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:8}}>
        {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map((d,i)=><div key={i} style={{fontWeight:700,textAlign:"center"}}>{d}</div>)}
        {Array(startOfMonth.getDay()).fill(null).map((_,i)=><div key={"empty"+i}></div>)}
        {calendar.map(day=>{
          const dayTasks = tasksForDay(day);
          const isToday = fmtDate(day)===todayStr;
          const badges=[];
          if (dayTasks.some(t=>t.done)) badges.push("🍪");
          if (dayTasks.some(t=>t.text.toLowerCase().includes("self-care")||t.text.toLowerCase().includes("relax"))) badges.push("🌸");
          return (
            <div key={fmtDate(day)} style={{
              border:isToday?"2px solid #f43f6e":"1px solid #e5e7eb",
              borderRadius:8,
              padding:4,
              minHeight:70,
              display:"flex",
              flexDirection:"column",
              gap:2,
              background:"#fff"
            }}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:12,fontWeight:600}}>{day.getDate()}</span>
                <span>{badges.join("")}</span>
              </div>
              <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:2}}>
                {dayTasks.map(task=>(
                  <div key={task.id} style={{display:"flex",alignItems:"center",gap:4}}>
                    <input type="checkbox" checked={task.done} onChange={()=>handleToggleDone(task)} />
                    <input type="text" value={task.text} onChange={e=>setTasks(prev=>prev.map(t=>t.id===task.id?{...t,text:e.target.value}:t))}
                      style={{flex:1,border:"none",outline:"none",background:"transparent",fontSize:12,textDecoration:task.done?"line-through":"none",color:task.done?"#9ca3af":"#111827"}}
                    />
                  </div>
                ))}
              </div>
              <AddDayTask day={day} onAdd={handleAddTask} />
            </div>
          );
        })}
      </div>
    </div>
  );
}

function AddDayTask({ day, onAdd }) {
  const [text,setText]=React.useState("");
  const handleSubmit=e=>{e.preventDefault(); onAdd(day,text); setText("");};
  return (
    <form onSubmit={handleSubmit} style={{display:"flex",gap:2,marginTop:2}}>
      <input value={text} onChange={e=>setText(e.target.value)} placeholder="+ task"
        style={{flex:1,border:"1px solid #e5e7eb",borderRadius:6,padding:2,fontSize:10}} />
      <button type="submit" style={{fontSize:10,background:"#f43f6e",color:"#fff",border:"none",borderRadius:6,cursor:"pointer"}}>➕</button>
    </form>
  );
}

// ── Main App ──
function App() {
  const [tasks,setTasks] = React.useState([]);
  const [cookies,setCookies] = React.useState(0);

  return <CalendarPage tasks={tasks} setTasks={setTasks} setCookies={setCookies} />;
}

// ── Render ──
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<AppErrorBoundary><App /></AppErrorBoundary>);

// ── Optional Service Worker ──
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/Cookie-Care-Joy/OneSignalSDKWorker.js")
    .then(()=>console.log("Service worker registered"));
}

</script>

</body>
</html>
