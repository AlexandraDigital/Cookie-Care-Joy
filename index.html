### Primary Functionality
This code initializes a Progressive Web App (PWA) designed as a "self-care companion." Its main responsibilities include:
1.  **Platform Detection:** Detects if the app is running inside a Median (formerly GoNative) wrapper.
2.  **Notification Management:** Integrates the **OneSignal SDK** to handle push notifications (cookie reminders) specifically for web users, while deferring to native handling for mobile app users.
3.  **PWA Configuration:** Defines manifest links, iOS-specific meta tags (status bar style, splash screens), and theme colors to allow the site to be installed as an app.
4.  **UI Setup:** Sets up global CSS animations (breathing effects, ripples) and loads dependencies like **React 18** and **Babel** (for in-browser JSX transpilation).

### Key Technologies
*   **Framework:** [React 18](https://react.dev/) (loaded via CDN).
*   **Libraries:** [OneSignal Web SDK](https://documentation.onesignal.com/docs/web-push-quickstart) (Push Notifications), [Babel Standalone](https://babeljs.io/docs/babel-standalone) (for processing JSX in the browser).
*   **APIs/Patterns:** PWA (Manifest, Service Workers), CSS Keyframe Animations, Viewport Meta Tags for mobile optimization.
