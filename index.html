// ── Shared AudioContext — resumed on first user gesture ───────────
let _audioCtx = null;
function getCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === "suspended") _audioCtx.resume();
  return _audioCtx;
}
// Call on any user gesture to fully unlock AudioContext for the session
let _audioReady = false;
function unlockAudio() {
  try {
    const ctx = getCtx();
    const buf = ctx.createBuffer(1, 1, ctx.sampleRate);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
    _audioReady = true;
  } catch(e) {}
}

// ── Aggressive alarm ──────────────────────────────────────────────
function playAggressiveAlarm() {
  try {
    const ctx = getCtx();
    // Sharp two-tone beep: high then low, repeated with rising urgency
    const beep = (start, dur, freq, vol = 0.55) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = "square";
      osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
      // Sharp attack, quick decay
      gain.gain.setValueAtTime(0, ctx.currentTime + start);
      gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + start + 0.01);
      gain.gain.setValueAtTime(vol, ctx.currentTime + start + dur - 0.02);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + start + dur);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur + 0.01);
    };
    // Pattern: BWEE-BWOO x3, pause, BWEE-BWOO-BWEE-BWOO faster x2
    // First group — steady
    beep(0.00, 0.18, 1050, 0.6);
    beep(0.20, 0.18,  750, 0.5);
    beep(0.45, 0.18, 1100, 0.6);
    beep(0.65, 0.18,  780, 0.5);
    beep(0.90, 0.18, 1150, 0.65);
    beep(1.10, 0.18,  800, 0.5);
    // Short gap, then faster urgent burst
    beep(1.45, 0.13, 1200, 0.7);
    beep(1.60, 0.13,  850, 0.55);
    beep(1.75, 0.13, 1250, 0.7);
    beep(1.90, 0.13,  900, 0.55);
    beep(2.05, 0.13, 1300, 0.75);
    beep(2.20, 0.13,  950, 0.6);
    beep(2.35, 0.13, 1350, 0.75);
    beep(2.50, 0.30,  700, 0.4);
  } catch(e) {}
}

// ── Zen audio engine ──────────────────────────────────────────────
function playZenSound(i) {
  try {
    const ctx = getCtx();
    const tone = (freq, type, start, dur, vol = 0.3) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
      gain.gain.setValueAtTime(0, ctx.currentTime + start);
      gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + start + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur);
    };
    const noise = (start, dur, vol = 0.05) => {
      const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let j = 0; j < data.length; j++) data[j] = Math.random() * 2 - 1;
      const src = ctx.createBufferSource(); src.buffer = buf;
      const flt = ctx.createBiquadFilter(); flt.type = "bandpass"; flt.frequency.value = 800; flt.Q.value = 0.5;
      const gain = ctx.createGain();
      src.connect(flt); flt.connect(gain); gain.connect(ctx.destination);
      gain.gain.setValueAtTime(0, ctx.currentTime + start);
      gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + start + 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
      src.start(ctx.currentTime + start);
      src.stop(ctx.currentTime + start + dur);
    };
    if (i === 0) {
      tone(523,"sine",0,1.2,0.25); tone(659,"sine",0.35,1.0,0.2);
      tone(784,"sine",0.7,1.2,0.2); tone(523,"sine",1.4,1.0,0.15);
    } else if (i === 1) {
      [1318,1047,1175,880,1047,784,1318,1047].forEach((f,j)=>tone(f,"sine",[0,.4,.65,1.1,1.35,1.75,2.0,2.4][j],0.55,0.08));
    } else if (i === 2) {
      [0,0.6,1.2,1.8].forEach(t=>{
        tone(1200,"triangle",t,0.08,0.15); tone(1400,"triangle",t+0.1,0.08,0.15);
        tone(1200,"triangle",t+0.2,0.08,0.15); tone(1600,"triangle",t+0.35,0.12,0.12);
        tone(1400,"triangle",t+0.48,0.1,0.12);
      });
    } else if (i === 3) {
      [880,1760,2640,3520].forEach((f,j)=>tone(f,"sine",0,2.0-j*0.3,0.2-j*0.04));
      tone(1174,"sine",0.6,1.2,0.15); tone(1318,"sine",1.1,0.8,0.1);
    } else if (i === 4) {
      noise(0,1.2,0.08); noise(0.8,1.2,0.06); noise(1.6,1.0,0.07);
      tone(200,"sine",0,2.4,0.04); tone(150,"sine",0.8,2.0,0.03);
    }
  } catch(e) {}
}

// ── Time Picker ───────────────────────────────────────────────────
function TimePickerWheel({ value, onChange, onClose }) {
  const now = new Date();
  const [hour, setHour] = useState(now.getHours() % 12 || 12);
  const [minute, setMinute] = useState(now.getMinutes());
  const [ampm, setAmpm] = useState(now.getHours() >= 12 ? "PM" : "AM");
  const hours = Array.from({length:12},(_,i)=>i+1);
  const minutes = Array.from({length:60},(_,i)=>i);
  const confirm = () => { onChange(`${String(hour).padStart(2,"0")}:${String(minute).padStart(2,"0")} ${ampm}`); onClose(); };
  const Col = ({ items, selected, onSelect, fmt=(x)=>String(x).padStart(2,"0") }) => (
    <div style={{ display:"flex",flexDirection:"column",alignItems:"center",height:180,overflowY:"auto",width:64,scrollSnapType:"y mandatory" }}>
      {items.map(item=>(
        <div key={item} onClick={()=>onSelect(item)} style={{
          scrollSnapAlign:"center", padding:"10px 0", minHeight:44, width:"100%", textAlign:"center",
          fontSize:item===selected?22:16, fontWeight:item===selected?800:400,
          color:item===selected?DARK:"#9ca3af", cursor:"pointer",
          background:item===selected?"rgba(244,63,110,0.08)":"transparent", borderRadius:8,
        }}>{fmt(item)}</div>
      ))}
    </div>
  );
  return (
    <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000 }} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{ background:WHITE,borderRadius:20,padding:"20px 24px",boxShadow:"0 20px 60px rgba(0,0,0,0.25)",width:320 }}>
        <div style={{ display:"flex",justifyContent:"center",gap:8,marginBottom:16 }}>
          <Col items={hours} selected={hour} onSelect={setHour} fmt={x=>String(x)} />
          <div style={{ display:"flex",alignItems:"center",fontSize:28,fontWeight:700,color:DARK,paddingBottom:4 }}>:</div>
          <Col items={minutes} selected={minute} onSelect={setMinute} />
          <div style={{ display:"flex",flexDirection:"column",justifyContent:"center",gap:8 }}>
            {["AM","PM"].map(p=>(
              <div key={p} onClick={()=>setAmpm(p)} style={{ padding:"10px 14px",borderRadius:10,cursor:"pointer",background:ampm===p?ROSE_LIGHT:"transparent",color:ampm===p?ROSE:GRAY,fontWeight:ampm===p?700:400,fontSize:16 }}>{p}</div>
            ))}
          </div>
        </div>
        <div style={{ display:"flex",justifyContent:"space-between",borderTop:"1px solid #f0e6f0",paddingTop:14 }}>
          <button onClick={()=>{onChange("");onClose();}} style={{ background:"none",border:"none",cursor:"pointer",color:ROSE,fontSize:15,fontWeight:600,fontFamily:"inherit" }}>Reset</button>
          <button onClick={confirm} style={{ background:"none",border:"none",cursor:"pointer",color:"#3b82f6",fontSize:15,fontWeight:700,fontFamily:"inherit" }}>Done</button>
        </div>
      </div>
    </div>
  );
}

// ── Date Picker ───────────────────────────────────────────────────
function DatePickerPopup({ value, onChange, onClose }) {
  const init = new Date(value + "T12:00:00");
  const [year, setYear] = useState(init.getFullYear());
  const [month, setMonth] = useState(init.getMonth());
  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const DAYS = ["Su","Mo","Tu","We","Th","Fr","Sa"];
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const ds = d => `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const todayStr = new Date().toISOString().split("T")[0];
  return (
    <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.2)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000 }} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{ background:WHITE,borderRadius:20,padding:"20px",boxShadow:"0 20px 60px rgba(0,0,0,0.2)",width:320 }}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16 }}>
          <button onClick={()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);}} style={{ background:"none",border:"none",fontSize:20,cursor:"pointer",color:GRAY }}>‹</button>
          <p style={{ margin:0,fontWeight:700,fontSize:16,color:DARK }}>{MONTHS[month]} {year}</p>
          <button onClick={()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);}} style={{ background:"none",border:"none",fontSize:20,cursor:"pointer",color:GRAY }}>›</button>
        </div>
        <div style={{ display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:6 }}>
          {DAYS.map(d=><div key={d} style={{ textAlign:"center",fontSize:11,fontWeight:600,color:GRAY,padding:"3px 0" }}>{d}</div>)}
        </div>
        <div style={{ display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3 }}>
          {Array.from({length:firstDay}).map((_,i)=><div key={"e"+i}/>)}
          {Array.from({length:daysInMonth}).map((_,i)=>{
            const d=i+1; const dateStr=ds(d);
            const isToday=dateStr===todayStr; const isSel=dateStr===value;
            return (
              <button key={d} onClick={()=>{onChange(dateStr);onClose();}} style={{
                padding:"9px 0",textAlign:"center",border:"none",borderRadius:10,cursor:"pointer",
                fontFamily:"inherit",fontSize:13,fontWeight:isToday?800:500,
                background:isSel?ROSE:isToday?"#fce7ef":"transparent",
                color:isSel?WHITE:isToday?ROSE:DARK,transition:"all 0.1s",
              }}>{d}</button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Task Row ──────────────────────────────────────────────────────
function TaskRow({ task, onToggle, onRemove, onEdit }) {
  const [editing, setEditing] = useState(false);
  const [editText, setEditText] = useState(task.text);
  const [editFolder, setEditFolder] = useState(task.folder || "");
  const [editTime, setEditTime] = useState(task.alertTime==="NOW" ? "" : (task.alertTime || ""));
  const [showTimePicker, setShowTimePicker] = useState(false);

  const save = () => {
    if (editText.trim()) {
      onEdit(task.id, { text:editText.trim(), folder:editFolder.trim(), alertTime:editTime });
      setEditing(false);
    }
  };

  if (editing) return (
    <>
      {showTimePicker && <TimePickerWheel value={editTime} onChange={t=>setEditTime(t)} onClose={()=>setShowTimePicker(false)} />}
      <div style={{ background:WHITE,borderRadius:14,padding:"14px 18px",border:`2px solid ${ROSE}`,boxShadow:"0 2px 12px rgba(244,63,110,0.12)" }}>
        <input value={editText} onChange={e=>setEditText(e.target.value)} autoFocus
          onKeyDown={e=>{ if(e.key==="Enter") save(); if(e.key==="Escape") setEditing(false); }}
          style={{ width:"100%",border:`2px solid ${ROSE}`,borderRadius:10,padding:"10px 12px",fontSize:15,outline:"none",fontFamily:"inherit",color:DARK,marginBottom:10,boxSizing:"border-box" }}
        />
        <div style={{ display:"flex",gap:8,marginBottom:10,flexWrap:"wrap" }}>
          <input value={editFolder} onChange={e=>setEditFolder(e.target.value)} placeholder="Folder (e.g. Morning)"
            style={{ flex:1,minWidth:120,border:"2px solid #e5e7eb",borderRadius:10,padding:"8px 12px",fontSize:13,outline:"none",fontFamily:"inherit" }}
          />
          <button onClick={()=>setShowTimePicker(true)} style={{ border:"2px solid #e5e7eb",borderRadius:10,padding:"8px 12px",background:editTime?ROSE_LIGHT:WHITE,color:editTime?ROSE:GRAY,cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:editTime?600:400 }}>
            {editTime || "🔔 Set time"}
          </button>
          {editTime && <button onClick={()=>setEditTime("")} style={{ border:"none",background:"none",cursor:"pointer",color:GRAY,fontSize:18,padding:"0 4px" }}>×</button>}
        </div>
        <div style={{ display:"flex",gap:8,justifyContent:"flex-end" }}>
          <button onClick={()=>setEditing(false)} style={{ padding:"8px 16px",borderRadius:10,border:"2px solid #e5e7eb",background:WHITE,cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600,color:GRAY }}>Cancel</button>
          <button onClick={save} style={{ padding:"8px 16px",borderRadius:10,border:"none",background:ROSE,cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:700,color:WHITE }}>Save ✓</button>
        </div>
      </div>
    </>
  );

  return (

// ── Alarm Modal ───────────────────────────────────────────────────
function AlarmModal({ task, onSnooze, onDone, purchased, selectedSound }) {
  const [stage, setStage] = React.useState("announce");

  // Use refs so the interval always reads the latest purchased/selectedSound
  const purchasedRef = React.useRef(purchased);
  const soundRef = React.useRef(selectedSound);
  useEffect(() => { purchasedRef.current = purchased; soundRef.current = selectedSound; }, [purchased, selectedSound]);

  const doPlay = () => {
    try {
      getCtx().resume().then(() => {
        if (purchasedRef.current) playZenSound(soundRef.current);
        else playAggressiveAlarm();
      });
    } catch(e) {}
  };

  // Sound fires immediately on mount — audio is already unlocked since user was using the app.
  // Repeats every 4s so it keeps ringing until snoozed or done.
  useEffect(() => {
    doPlay();
    const iv = setInterval(doPlay, 4000);
    return () => clearInterval(iv);
  }, []);

  // ── Stage 1: full-screen announcement (sound already playing) ─────
  if (stage === "announce") {
    return (
      <div style={{ position:"fixed",inset:0,zIndex:2000,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
        background:`linear-gradient(135deg, ${purchased?"#fffbeb, #fef3c7":"#fce7ef, #fdf2f8"})` }}>
        <style>{`
          @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
          @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        `}</style>
        <div style={{ textAlign:"center",padding:"40px 32px",maxWidth:480,animation:"fadeUp 0.5s ease-out" }}>
          <div style={{ fontSize:88,lineHeight:1,marginBottom:24,display:"inline-block",animation:"bob 2s ease-in-out infinite" }}>
            {purchased ? "✨" : "⏰"}
          </div>
          <h1 style={{ margin:"0 0 12px",fontSize:36,fontWeight:900,color:purchased?GOLD:ROSE,fontFamily:"Georgia,serif" }}>
            Time for a task!

          <p style={{ margin:"0 0 8px",fontSize:18,color:DARK,fontWeight:600 }}>{task.text}</p>
          {task.folder && <p style={{ margin:"0 0 28px",fontSize:14,color:GRAY }}>📁 {task.folder}</p>}
          <p style={{ margin:"0 0 36px",fontSize:15,color:GRAY,lineHeight:1.6 }}>
            You set a reminder for this.<br/>Ready to get it done? 💪
          </p>
          <button onClick={()=>setStage("alarm")} style={{
            background:purchased?GOLD:ROSE, border:"none", borderRadius:20,
            padding:"18px 48px", fontSize:18, fontWeight:800, color:WHITE,
            cursor:"pointer", fontFamily:"inherit",
            boxShadow:`0 8px 32px ${purchased?"rgba(245,158,11,0.4)":"rgba(244,63,110,0.4)"}`,
          }}>
            Let's go! 🚀
          </button>
        </div>
      </div>
    );

  // ── Stage 2: alarm detail modal ───────────────────────────────────
  return (
    <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000 }}>
      <style>{`@keyframes pulse{0%,100%{box-shadow:0 0 0 6px rgba(244,63,110,0.15),0 20px 60px rgba(0,0,0,0.25)}50%{box-shadow:0 0 0 14px rgba(244,63,110,0.08),0 20px 60px rgba(0,0,0,0.25)}} @keyframes ring{from{transform:rotate(-15deg)}to{transform:rotate(15deg)}}`}</style>
      <div style={{ background:WHITE,borderRadius:24,padding:"36px 32px",maxWidth:420,width:"90%",textAlign:"center",border:`3px solid ${purchased?GOLD:ROSE}`,animation:"pulse 1s ease-in-out infinite",boxShadow:`0 0 0 6px ${purchased?"rgba(245,158,11,0.15)":"rgba(244,63,110,0.15)"}, 0 20px 60px rgba(0,0,0,0.25)` }}>
        <button onClick={doPlay} style={{ fontSize:52,marginBottom:2,display:"inline-block",animation:"ring 0.5s ease-in-out infinite alternate",background:"none",border:"none",cursor:"pointer",padding:0,lineHeight:1 }}>
          {purchased ? "✨" : "🔔"}
        </button>
        <p style={{ margin:"0 0 10px",fontSize:11,color:GRAY }}>tap bell to replay</p>
        <h2 style={{ margin:"0 0 6px",fontSize:28,fontWeight:900,color:purchased?GOLD:ROSE }}>DO IT NOW!!!</h2>

// To generate a code for a buyer: open developer-tool.html privately
// Each code is tied to the buyer's email — hard to guess or share
async function verifyUnlockCode(email, code) {
  const secret = "ccj-golden-2024-🍪";
  const encoder = new TextEncoder();
  const keyData = encoder.encode(secret);
  const msgData = encoder.encode(email.trim().toLowerCase());
  const key = await crypto.subtle.importKey("raw", keyData, { name:"HMAC", hash:"SHA-256" }, false, ["sign"]);
  const sig = await crypto.subtle.sign("HMAC", key, msgData);
  const hex = Array.from(new Uint8Array(sig)).map(b=>b.toString(16).padStart(2,"0")).join("");
  const expected = hex.slice(0,8).toUpperCase();
  return code.trim().toUpperCase() === expected;
}

// ── APP ROOT ──────────────────────────────────────────────────────
function App() {
  // Unlock AudioContext on the very first user interaction (mousedown fires before click)
  useEffect(() => {
    const unlock = () => {
      unlockAudio();
document.removeEventListener('mousedown', unlock);
      document.removeEventListener('touchstart', unlock);
      document.removeEventListener('keydown', unlock);
    };
    document.addEventListener('mousedown', unlock);
    document.addEventListener('touchstart', unlock);
    document.addEventListener('keydown', unlock);
    return () => { document.removeEventListener('mousedown', unlock); document.removeEventListener('touchstart', unlock); document.removeEventListener('keydown', unlock); };
  }, []);
  // ── Persisted state — loaded from localStorage on first render ──
  const load = (key, fallback) => {
    try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : fallback; } catch { return fallback; }
  };
  const save = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} };

  const [page, setPage] = useState("today");
  const [cookies, setCookiesRaw] = useState(() => load("ccj_cookies", 0));
  const [trophies, setTrophies] = useState(() => load("ccj_trophies", 0));
  const [showTrophy, setShowTrophy] = useState(false);
  const [purchased, setPurchased] = useState(() => load("ccj_purchased", false));
  const [selectedTheme, setSelectedTheme] = useState(() => load("ccj_theme", 1));
  const [selectedSound, setSelectedSound] = useState(() => load("ccj_sound", 0));
  const [tasks, setTasks] = useState(() => load("ccj_tasks", []));

  // ── Auto-save whenever state changes ──
  useEffect(() => { save("ccj_cookies", cookies); }, [cookies]);
  useEffect(() => { save("ccj_trophies", trophies); }, [trophies]);
  useEffect(() => { save("ccj_purchased", purchased); }, [purchased]);
  useEffect(() => { save("ccj_theme", selectedTheme); }, [selectedTheme]);
  useEffect(() => { save("ccj_sound", selectedSound); }, [selectedSound]);
  useEffect(() => { save("ccj_tasks", tasks); }, [tasks]);
  const [notifPerm, setNotifPerm] = useState(() =>
    "Notification" in window ? Notification.permission : "unsupported"
  );

  const requestNotifications = async () => {
    if (!("Notification" in window)) return;
    const result = await Notification.requestPermission();
    setNotifPerm(result);
    if (result === "granted") {
      new Notification("🍪 Cookie-Care-Joy", {
        body: "Notifications are on! You'll be alerted when tasks are due.",
        icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍪</text></svg>",
      });
    }
  };

  const setCookies = (delta) => {
    setCookiesRaw(prev => {
      const next = Math.max(0, prev + delta);
      const prevT = Math.floor(prev / 100);
      const nextT = Math.floor(next / 100);
      if (nextT > prevT) {
        setTrophies(t => t + (nextT - prevT));
        setShowTrophy(true);
        setTimeout(() => setShowTrophy(false), 7000);
      }
      return next;
    });
  };

  const [snoozed, setSnoozed] = useState(() => load("ccj_snoozed", {}));
  useEffect(() => { save("ccj_snoozed", snoozed); }, [snoozed]);
  const [alarmTask, setAlarmTask] = useState(null);
  // Track which alarms already fired today so they don't re-fire on reload
  const [firedAlarms, setFiredAlarms] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem("ccj_fired") || "{}");
      const today = new Date().toISOString().split("T")[0];
      // Clear entries from previous days
      return saved[today] || [];
    } catch { return []; }
  });
  useEffect(() => {
    const today = new Date().toISOString().split("T")[0];
    try { localStorage.setItem("ccj_fired", JSON.stringify({ [today]: firedAlarms })); } catch {}
  }, [firedAlarms]);

  const fmtTime = d => {
    const hh = d.getHours(); const mm = d.getMinutes();
    const ampm = hh >= 12 ? "PM" : "AM";
    return `${String(hh%12||12).padStart(2,"0")}:${String(mm).padStart(2,"0")} ${ampm}`;
  };

  useEffect(() => {
    // Small delay so app fully loads before first alarm check
    const startup = setTimeout(() => {}, 2000);
    const check = () => {
      if (alarmTask) return;
      const now = new Date();
      const todayStr = now.toISOString().split("T")[0];
      const nowStr = fmtTime(now);
      const nowMs = now.getTime();
      const firing = tasks.find(t => {
        if (t.done || t.date !== todayStr) return false;
        if (firedAlarms.includes(t.id + "_" + t.alertTime)) return false;
        const snoozeUntil = snoozed[t.id];
        if (snoozeUntil && nowMs < snoozeUntil) return false;
        return t.alertTime !== "NOW" && t.alertTime === nowStr;
      });
      if (firing) {
        setFiredAlarms(prev => [...prev, firing.id + "_" + firing.alertTime]);
        setAlarmTask(firing);
        // Fire system notification — clearly branded so user knows where it's from
        if ("Notification" in window && Notification.permission === "granted") {
          const timeStr = firing.alertTime && firing.alertTime !== "NOW" ? " at " + firing.alertTime : "";
          const folderStr = firing.folder ? "\n📁 " + firing.folder : "";
          const cookieIcon = "data:image/svg+xml," + encodeURIComponent(
            '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="22" fill="#f43f6e"/><text y="72" x="50" text-anchor="middle" font-size="62">🍪</text></svg>'
          );
          const n = new Notification("⏰ Cookie-Care-Joy Reminder", {
            body: firing.text + timeStr + folderStr + "\n\nTap to open the app →",
            icon: cookieIcon,
            badge: cookieIcon,
            tag: "ccj-alarm-" + firing.id,
            requireInteraction: true,
            silent: false,
          });
          n.onclick = () => { window.focus(); n.close(); };

          // Re-notify every 2 minutes if user hasn't opened the app (max 3 times)
          let renotifyCount = 0;
          const renotify = setInterval(() => {
            if (renotifyCount >= 2) { clearInterval(renotify); return; }
            renotifyCount++;
            const r = new Notification("⏰ Cookie-Care-Joy — Still waiting!", {
              body: "🍪 Don't forget: " + firing.text + "\n\nTap to open →",
              icon: cookieIcon,
              badge: cookieIcon,
              tag: "ccj-alarm-" + firing.id + "-r" + renotifyCount,
              requireInteraction: true,
            });
            r.onclick = () => { window.focus(); r.close(); clearInterval(renotify); };
          }, 2 * 60 * 1000);
        }

        // Vibrate if supported (mobile)
        if ("vibrate" in navigator) {
          navigator.vibrate([400, 200, 400, 200, 800]);
        }
      }
    };
    let iv;
    const delayed = setTimeout(() => {
      check();
      iv = setInterval(check, 15000);
    }, 2000);
    return () => { clearTimeout(delayed); clearInterval(iv); };
  }, [tasks, snoozed, alarmTask, firedAlarms, selectedSound, purchased]);

  const handleSnooze = () => {
    if (!alarmTask) return;
    setSnoozed(s => ({ ...s, [alarmTask.id]: Date.now() + 5*60*1000 }));
    setAlarmTask(null);
  };

  const handleAlarmDone = () => {
    if (!alarmTask) return;
    setCookies(1);
    setTasks(prev => prev.map(t => t.id===alarmTask.id ? {...t,done:true} : t));
    setSnoozed(s => { const n={...s}; delete n[alarmTask.id]; return n; });
    setAlarmTask(null);
  };

  const renderPage = () => {
    if (page === "today")     return <TodayPage tasks={tasks} setTasks={setTasks} cookies={cookies} setCookies={setCookies} setPage={setPage} purchased={purchased} selectedSound={selectedSound} />;
    if (page === "calendar")  return <CalendarPage tasks={tasks} setTasks={setTasks} setCookies={setCookies} setPage={setPage} />;
    if (page === "selfcare")  return <SelfCarePage tasks={tasks} setTasks={setTasks} setCookies={setCookies} />;
    if (page === "cookiejar") return <CookieJarPage cookies={cookies} tasks={tasks} purchased={purchased} selectedTheme={selectedTheme} trophies={trophies} />;
    if (page === "bakery")    return <BakeryPage purchased={purchased} setPurchased={setPurchased} selectedTheme={selectedTheme} setSelectedTheme={setSelectedTheme} selectedSound={selectedSound} setSelectedSound={setSelectedSound} />;
  };

  return (
    <div style={{ minHeight:"100vh", background:"#fdf6fb", fontFamily:"system-ui,-apple-system,sans-serif" }} className="page-root"
      onClick={unlockAudio}
      onKeyDown={unlockAudio}
    >
      <style>{`
        @keyframes trophyPop{0%{transform:scale(0.3) rotate(-10deg);opacity:0}60%{transform:scale(1.2) rotate(3deg)}100%{transform:scale(1) rotate(0deg);opacity:1}}
        @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(120px) rotate(720deg);opacity:0}}
        @keyframes trophyFadeOut{0%,85%{opacity:1}100%{opacity:0;pointer-events:none}}
      `}</style>

      {/* Notification permission banner */}
      {typeof Notification !== "undefined" && Notification.permission === "default" && (
        <div onClick={requestNotifications} style={{
          background:"linear-gradient(135deg,#fce7ef,#fdf2f8)",
          borderBottom:`2px solid ${ROSE_LIGHT}`,
          padding:"10px 20px",
          display:"flex", alignItems:"center", gap:10,
          cursor:"pointer", justifyContent:"center",
        }}>
          <span style={{ fontSize:18 }}>🔔</span>
          <span style={{ fontSize:13, fontWeight:700, color:ROSE }}>
            Tap to enable alarm notifications — get alerted even when the app is in the background
          </span>
          <span style={{ fontSize:13, color:GRAY, fontWeight:600 }}>→</span>
        </div>
      )}

      {showTrophy && (
        <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:3000,animation:"trophyFadeOut 7s forwards" }}>
          <div style={{ position:"absolute",top:"15%",left:0,right:0,display:"flex",justifyContent:"center",gap:20,pointerEvents:"none" }}>
            {["🎊","⭐","🎉","✨","🌟","💛","🎈","🍪","⭐","🎊"].map((e,i)=>(
              <span key={i} style={{ fontSize:24,animation:`confettiFall ${1+i*0.1}s ease-out ${i*0.07}s both` }}>{e}</span>
            ))}
          </div>
          <div style={{ background:WHITE,borderRadius:28,padding:"44px 52px",textAlign:"center",border:`3px solid ${GOLD}`,boxShadow:`0 0 0 8px rgba(245,158,11,0.2),0 24px 80px rgba(0,0,0,0.4)` }}>
            <div style={{ fontSize:88,marginBottom:10,display:"inline-block",animation:"trophyPop 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards" }}>🏆</div>
            <h2 style={{ margin:"0 0 10px",fontSize:32,fontWeight:900,color:GOLD,fontFamily:"Georgia,serif" }}>Baker Trophy Earned!</h2>
            <p style={{ margin:"0 0 6px",fontSize:17,color:DARK,fontWeight:600 }}>You collected 100 cookies! 🍪</p>
            <p style={{ margin:0,fontSize:15,color:GRAY }}>You now have <strong style={{color:GOLD}}>{trophies} Baker {trophies===1?"Trophy":"Trophies"}</strong> — keep going! ✨</p>
          </div>
        </div>
      )}

      {alarmTask && <AlarmModal task={alarmTask} onSnooze={handleSnooze} onDone={handleAlarmDone} purchased={purchased} selectedSound={selectedSound} />}
      <NavBar page={page} setPage={setPage} />
      {"Notification" in window && notifPerm === "default" && (
        <div style={{ background:"#fffbeb",borderBottom:"2px solid #fde68a",padding:"10px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap" }}>
          <span style={{ fontSize:14,color:"#92400e",fontWeight:600 }}>🔔 Enable notifications to get alerted when tasks are due — even when the tab is minimised</span>
          <button onClick={requestNotifications} style={{ background:"#f59e0b",border:"none",borderRadius:10,padding:"8px 18px",fontSize:13,fontWeight:800,color:"#fff",cursor:"pointer",fontFamily:"inherit",flexShrink:0 }}>Enable Notifications</button>
        </div>
      )}
      {notifPerm === "denied" && (
        <div style={{ background:"#fef2f2",borderBottom:"2px solid #fca5a5",padding:"10px 20px",display:"flex",alignItems:"center",gap:10 }}>
          <span style={{ fontSize:14,color:"#991b1b",fontWeight:600 }}>🔕 Notifications blocked — go to your browser settings to allow them for this site</span>
        </div>
      )}
      {renderPage()}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
