<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cookie Care Joy - Track your cookie consumption with joy!">
    <meta name="theme-color" content="#8B4513">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png">
    <title>Cookie Care Joy 🍪</title>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js').then(reg => {
                console.log('Service Worker registered:', reg);
            }).catch(err => {
                console.log('Service Worker registration failed:', err);
            });
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FFF5E1 0%, #FFE4B5 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #root {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .presplash {
            background: linear-gradient(135deg, #8B4513 0%, #D2691E 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .presplash h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .presplash p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .container {
            padding: 30px 20px;
        }

        .stat-box {
            background: #FFF5E1;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            border-left: 4px solid #D2691E;
        }

        .stat-box h3 {
            color: #8B4513;
            margin-bottom: 5px;
        }

        .stat-box .number {
            font-size: 2em;
            font-weight: bold;
            color: #D2691E;
        }

        button {
            background: #D2691E;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
            width: 100%;
        }

        button:hover {
            background: #8B4513;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        #ccj-pwa-install-btn {
            display: none;
            background: linear-gradient(135deg, #8B4513 0%, #D2691E 100%);
            padding: 15px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        #ccj-pwa-install-btn.show {
            display: block;
        }

        #ccj-pwa-install-prompt {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            padding: 20px;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }

        #ccj-pwa-install-prompt.show {
            display: block;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div id="presplash" class="presplash">
        <h1>🍪 Cookie Care Joy</h1>
        <p>Track your cookie consumption journey</p>
    </div>
    
    <div id="root" class="container">
        <div class="stat-box">
            <h3>Today's Cookies</h3>
            <div class="number" id="today-count">0</div>
        </div>
        
        <div class="stat-box">
            <h3>This Week</h3>
            <div class="number" id="week-count">0</div>
        </div>
        
        <div class="stat-box">
            <h3>All Time</h3>
            <div class="number" id="total-count">0</div>
        </div>
        
        <button id="add-cookie-btn">🍪 Add Cookie</button>
        <button id="reset-btn">Reset Stats</button>
    </div>

    <!-- PWA Install Button (Desktop) -->
    <button id="ccj-pwa-install-btn" style="position: fixed; bottom: 20px; right: 20px; z-index: 999;">
        📲 Install App
    </button>

    <!-- PWA Install Prompt (Mobile) -->
    <div id="ccj-pwa-install-prompt">
        <p><strong>Install Cookie Care Joy</strong></p>
        <p style="font-size: 0.9em; margin: 10px 0;">Add to your home screen for quick access!</p>
        <button id="install-prompt-yes" style="margin: 10px 0 5px 0;">Install</button>
        <button id="install-prompt-no" style="background: #999; margin: 5px 0 0 0;">Later</button>
    </div>

    <script>
        let deferredPrompt;
        const installBtn = document.getElementById('ccj-pwa-install-btn');
        const installPrompt = document.getElementById('ccj-pwa-install-prompt');
        const installPromptYes = document.getElementById('install-prompt-yes');
        const installPromptNo = document.getElementById('install-prompt-no');

        // Capture the beforeinstallprompt event
        window.addEventListener('beforeinstallprompt', (e) => {
            console.log('beforeinstallprompt fired');
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.add('show');
            installPrompt.classList.add('show');
        });

        // Handle install button click
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`User response to the install prompt: ${outcome}`);
                deferredPrompt = null;
                installBtn.classList.remove('show');
                installPrompt.classList.remove('show');
            }
        });

        // Handle prompt yes/no buttons
        installPromptYes.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`User response to the install prompt: ${outcome}`);
                deferredPrompt = null;
                installBtn.classList.remove('show');
                installPrompt.classList.remove('show');
            }
        });

        installPromptNo.addEventListener('click', () => {
            installPrompt.classList.remove('show');
        });

        // Handle app installed event
        window.addEventListener('appinstalled', () => {
            console.log('PWA was installed');
            deferredPrompt = null;
            installBtn.classList.remove('show');
            installPrompt.classList.remove('show');
        });

        // Cookie counter logic
        const addCookieBtn = document.getElementById('add-cookie-btn');
        const resetBtn = document.getElementById('reset-btn');
        const todayCount = document.getElementById('today-count');
        const weekCount = document.getElementById('week-count');
        const totalCount = document.getElementById('total-count');

        // Load stats from localStorage
        function loadStats() {
            const stats = JSON.parse(localStorage.getItem('cookieStats')) || {
                today: 0,
                week: 0,
                total: 0,
                lastReset: new Date().toDateString()
            };

            // Reset today count if it's a new day
            if (stats.lastReset !== new Date().toDateString()) {
                stats.today = 0;
                stats.lastReset = new Date().toDateString();
            }

            updateDisplay(stats);
            return stats;
        }

        function updateDisplay(stats) {
            todayCount.textContent = stats.today;
            weekCount.textContent = stats.week;
            totalCount.textContent = stats.total;
        }

        function saveStats(stats) {
            localStorage.setItem('cookieStats', JSON.stringify(stats));
        }

        addCookieBtn.addEventListener('click', () => {
            const stats = JSON.parse(localStorage.getItem('cookieStats')) || {
                today: 0,
                week: 0,
                total: 0
            };
            stats.today++;
            stats.week++;
            stats.total++;
            updateDisplay(stats);
            saveStats(stats);
        });

        resetBtn.addEventListener('click', () => {
            if (confirm('Are you sure you want to reset all stats?')) {
                const stats = { today: 0, week: 0, total: 0, lastReset: new Date().toDateString() };
                updateDisplay(stats);
                saveStats(stats);
            }
        });

        // Initial load
        loadStats();
    </script>
</body>
</html>
