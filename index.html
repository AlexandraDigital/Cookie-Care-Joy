  <script>
  (function () {
    var ua = navigator.userAgent;
    var isAndroid = /android/i.test(ua);
    var isIOS = /iP(hone|od|ad)/i.test(ua);
    var isMobile = isAndroid || isIOS || window.innerWidth <= 600;
    function isStandalone() { return window.matchMedia('(display-mode: standalone)').matches || window.matchMedia('(display-mode: fullscreen)').matches || window.navigator.standalone === true; }
    if (isStandalone()) return;
    var btn = document.getElementById('ccj-pwa-install-btn');
    var fab = document.getElementById('ccj-pwa-install-fab');
    function doInstall() {
      var p = window._deferredInstallPrompt;
      if (p) {
        p.prompt();
        p.userChoice.then(function(r) {
          window._deferredInstallPrompt = null;
          if (r && r.outcome === 'accepted') {
            if (btn) btn.style.display = 'none';
            if (fab) fab.classList.remove('show');
          } else { resetBtn(); }
        });
      } else {
        if (btn) btn.textContent = 'Use browser menu → Install App';
        if (fab) fab.textContent = 'Browser menu → Install App';
        setTimeout(resetBtn, 3000);
      }
    }
    function show() {
      if (isStandalone()) return;
      if (btn) btn.onclick = doInstall;
      if (isMobile && window._deferredInstallPrompt) { if (fab) { fab.onclick = doInstall; fab.classList.add('show'); } }
    }
    if (btn) btn.onclick = doInstall;
    window._ccjOnPromptReady = show;
    if (window._deferredInstallPrompt) show();
    var poll = setInterval(function() { if (window._deferredInstallPrompt) { clearInterval(poll); show(); } }, 200);
    setTimeout(function() { clearInterval(poll); }, 30000);
  })();
  </script>
