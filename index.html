    // ── Shared AudioContext — resumed on first user gesture ───────────
    let _audioCtx = null;
    function getCtx() {
      if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (_audioCtx.state === "suspended") _audioCtx.resume();
      return _audioCtx;
    }
    // Call on any user gesture to fully unlock AudioContext for the session
    let _audioReady = false;
    function unlockAudio() {
      try {
        const ctx = getCtx();
        const buf = ctx.createBuffer(1, 1, ctx.sampleRate);
        const src = ctx.createBufferSource();
        src.buffer = buf;
        src.connect(ctx.destination);
        src.start(0);
        _audioReady = true;
      } catch (e) { }
    }

    // ── Aggressive alarm ──────────────────────────────────────────────
    function playAggressiveAlarm() {
      try {
        const ctx = getCtx();
        // Sharp two-tone beep: high then low, repeated with rising urgency
        const beep = (start, dur, freq, vol = 0.55) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.type = "square";
          osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
          // Sharp attack, quick decay
          gain.gain.setValueAtTime(0, ctx.currentTime + start);
          gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + start + 0.01);
          gain.gain.setValueAtTime(vol, ctx.currentTime + start + dur - 0.02);
          gain.gain.linearRampToValueAtTime(0, ctx.currentTime + start + dur);
          osc.start(ctx.currentTime + start);
          osc.stop(ctx.currentTime + start + dur + 0.01);
        };
        // Pattern: BWEE-BWOO x3, pause, BWEE-BWOO-BWEE-BWOO faster x2
        // First group — steady
        beep(0.00, 0.18, 1050, 0.6);
        beep(0.20, 0.18, 750, 0.5);
        beep(0.45, 0.18, 1100, 0.6);
        beep(0.65, 0.18, 780, 0.5);
        beep(0.90, 0.18, 1150, 0.65);
        beep(1.10, 0.18, 800, 0.5);
        // Short gap, then faster urgent burst
        beep(1.45, 0.13, 1200, 0.7);
        beep(1.60, 0.13, 850, 0.55);
        beep(1.75, 0.13, 1250, 0.7);

    // ── Zen audio engine ──────────────────────────────────────────────
    function playZenSound(i) {
      try {
        const ctx = getCtx();
        const tone = (freq, type, start, dur, vol = 0.3) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.type = type;
          osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
          gain.gain.setValueAtTime(0, ctx.currentTime + start);
          gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + start + 0.05);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
          osc.start(ctx.currentTime + start);
          osc.stop(ctx.currentTime + start + dur);
        };
        const noise = (start, dur, vol = 0.05) => {
          const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
          const data = buf.getChannelData(0);
          for (let j = 0; j < data.length; j++) data[j] = Math.random() * 2 - 1;
          const src = ctx.createBufferSource(); src.buffer = buf;
          const flt = ctx.createBiquadFilter(); flt.type = "bandpass"; flt.frequency.value = 800; flt.Q.value = 0.5;
          const gain = ctx.createGain();
          src.connect(flt); flt.connect(gain); gain.connect(ctx.destination);
          gain.gain.setValueAtTime(0, ctx.currentTime + start);
          gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + start + 0.1);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
          src.start(ctx.currentTime + start);
          src.stop(ctx.currentTime + start + dur);
        };
        if (i === 0) {
          tone(523, "sine", 0, 1.2, 0.25); tone(659, "sine", 0.35, 1.0, 0.2);
          tone(784, "sine", 0.7, 1.2, 0.2); tone(523, "sine", 1.4, 1.0, 0.15);
        } else if (i === 1) {
          [1318, 1047, 1175, 880, 1047, 784, 1318, 1047].forEach((f, j) => tone(f, "sine", [0, .4, .65, 1.1, 1.35, 1.75, 2.0, 2.4][j], 0.55, 0.08));
        } else if (i === 2) {
          [0, 0.6, 1.2, 1.8].forEach(t => {
            tone(1200, "triangle", t, 0.08, 0.15); tone(1400, "triangle", t + 0.1, 0.08, 0.15);
            tone(1200, "triangle", t + 0.2, 0.08, 0.15); tone(1600, "triangle", t + 0.35, 0.12, 0.12);
            tone(1400, "triangle", t + 0.48, 0.1, 0.12);
          });
        } else if (i === 3) {
          [880, 1760, 2640, 3520].forEach((f, j) => tone(f, "sine", 0, 2.0 - j * 0.3, 0.2 - j * 0.04));
          tone(1174, "sine", 0.6, 1.2, 0.15); tone(1318, "sine", 1.1, 0.8, 0.1);
        } else if (i === 4) {
          noise(0, 1.2, 0.08); noise(0.8, 1.2, 0.06); noise(1.6, 1.0, 0.07);
          tone(200, "sine", 0, 2.4, 0.04); tone(150, "sine", 0.8, 2.0, 0.03);
        }
      } catch (e) { }
    }

          elapsed++;

    // ── Time Picker ───────────────────────────────────────────────────
    function TimePickerWheel({ value, onChange, onClose }) {
      const { useRef, useEffect } = React;
      const now = new Date();
      const [hour, setHour] = useState(now.getHours() % 12 || 12);
      const [minute, setMinute] = useState(now.getMinutes());
      const [ampm, setAmpm] = useState(now.getHours() >= 12 ? "PM" : "AM");
      const hours = Array.from({ length: 12 }, (_, i) => i + 1);
      const minutes = Array.from({ length: 60 }, (_, i) => i);
      const ITEM_H = 44;

      const confirm = () => { onChange(`${String(hour).padStart(2, "0")}:${String(minute).padStart(2, "0")} ${ampm}`); onClose(); };

      // Scroll column that syncs selection from scroll position
      const Col = ({ items, selected, onSelect, fmt = (x) => String(x).padStart(2, "0") }) => {
        const ref = useRef(null);
        const scrollTimer = useRef(null);

        // Scroll to selected item on mount
        useEffect(() => {
          if (!ref.current) return;
          const idx = items.indexOf(selected);
          if (idx >= 0) ref.current.scrollTop = idx * ITEM_H;
        }, []);

        const handleScroll = () => {
          clearTimeout(scrollTimer.current);
          scrollTimer.current = setTimeout(() => {
            if (!ref.current) return;
            const idx = Math.round(ref.current.scrollTop / ITEM_H);
            const clamped = Math.max(0, Math.min(idx, items.length - 1));
            // Snap scroll to exact position
            ref.current.scrollTop = clamped * ITEM_H;
            onSelect(items[clamped]);
          }, 80);
        };

        return (
          <div style={{ position: "relative", width: 64 }}>
            {/* Selection highlight band */}
            <div style={{ position: "absolute", top: "50%", left: 0, right: 0, height: ITEM_H, transform: "translateY(-50%)", background: "rgba(244,63,110,0.08)", borderRadius: 10, pointerEvents: "none", zIndex: 1 }} />
            <div ref={ref} onScroll={handleScroll} style={{
              display: "flex", flexDirection: "column", alignItems: "center",
              height: 180, overflowY: "scroll", width: 64,
              scrollbarWidth: "none", msOverflowStyle: "none",
              paddingTop: (180 / 2 - ITEM_H / 2) + "px",
              paddingBottom: (180 / 2 - ITEM_H / 2) + "px",
              boxSizing: "border-box",
            }}>
              {items.map(item => (
                <div key={item} onClick={() => {
                  onSelect(item);
                  const idx = items.indexOf(item);
                  if (ref.current) ref.current.scrollTop = idx * ITEM_H;
                }} style={{
                  minHeight: ITEM_H, width: "100%", textAlign: "center",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: item === selected ? 22 : 16, fontWeight: item === selected ? 700 : 400,
                  color: item === selected ? DARK : "#9ca3af", cursor: "pointer",
                  flexShrink: 0, transition: "font-size 0.1s, color 0.1s",
                }}>{fmt(item)}</div>
              ))}
            </div>
          </div>
        );
      };

      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.35)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }} onClick={onClose}>
          <div onClick={e => e.stopPropagation()} style={{ background: WHITE, borderRadius: 20, padding: "20px 24px", boxShadow: "0 20px 60px rgba(0,0,0,0.25)", width: 320 }}>
            <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 8, marginBottom: 16 }}>
              <Col items={hours} selected={hour} onSelect={setHour} fmt={x => String(x)} />
              <div style={{ fontSize: 28, fontWeight: 700, color: DARK, paddingBottom: 4 }}>:</div>
              <Col items={minutes} selected={minute} onSelect={setMinute} />
              <div style={{ display: "flex", flexDirection: "column", justifyContent: "center", gap: 8, marginLeft: 8 }}>
                {["AM", "PM"].map(p => (
                  <div key={p} onClick={() => setAmpm(p)} style={{ padding: "10px 14px", borderRadius: 10, cursor: "pointer", background: ampm === p ? ROSE_LIGHT : "transparent", color: ampm === p ? ROSE : GRAY, fontWeight: ampm === p ? 700 : 400, fontSize: 16 }}>{p}</div>
                ))}
              </div>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", borderTop: "1px solid #f0e6f0", paddingTop: 14 }}>
              <button onClick={() => { onChange(""); onClose(); }} style={{ background: "none", border: "none", cursor: "pointer", color: ROSE, fontSize: 15, fontWeight: 600, fontFamily: "inherit" }}>Reset</button>
              <button onClick={confirm} style={{ background: "none", border: "none", cursor: "pointer", color: "#3b82f6", fontSize: 15, fontWeight: 700, fontFamily: "inherit" }}>Done</button>
            </div>
          </div>
        </div>
      );
    }

    // ── Date Picker ───────────────────────────────────────────────────
    function DatePickerPopup({ value, onChange, onClose }) {
      const init = new Date(value + "T12:00:00");
      const [year, setYear] = useState(init.getFullYear());
      const [month, setMonth] = useState(init.getMonth());
      const MONTHS = t.months;
      const DAYS = t.dayAbbr;
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const ds = d => `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
      const todayStr = new Date().toISOString().split("T")[0];
      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.2)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }} onClick={onClose}>
          <div onClick={e => e.stopPropagation()} style={{ background: WHITE, borderRadius: 20, padding: "20px", boxShadow: "0 20px 60px rgba(0,0,0,0.2)", width: 320 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <button onClick={() => { if (month === 0) { setMonth(11); setYear(y => y - 1); } else setMonth(m => m - 1); }} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", color: GRAY }}>‹</button>
              <p style={{ margin: 0, fontWeight: 700, fontSize: 16, color: DARK }}>{MONTHS[month]} {year}</p>
              <button onClick={() => { if (month === 11) { setMonth(0); setYear(y => y + 1); } else setMonth(m => m + 1); }} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", color: GRAY }}>›</button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", marginBottom: 6 }}>
              {DAYS.map(d => <div key={d} style={{ textAlign: "center", fontSize: 11, fontWeight: 600, color: GRAY, padding: "3px 0" }}>{d}</div>)}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 3 }}>
              {Array.from({ length: firstDay }).map((_, i) => <div key={"e" + i} />)}
              {Array.from({ length: daysInMonth }).map((_, i) => {
                const d = i + 1; const dateStr = ds(d);
                const isToday = dateStr === todayStr; const isSel = dateStr === value;
                return (
                  <button key={d} onClick={() => { onChange(dateStr); onClose(); }} style={{
                    padding: "9px 0", textAlign: "center", border: "none", borderRadius: 10, cursor: "pointer",
                    fontFamily: "inherit", fontSize: 13, fontWeight: isToday ? 800 : 500,
                    background: isSel ? ROSE : isToday ? "#fce7ef" : "transparent",
                    color: isSel ? WHITE : isToday ? ROSE : DARK, transition: "all 0.1s",
                  }}>{d}</button>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // ── Task Row ──────────────────────────────────────────────────────
    function TaskRow({ task, onToggle, onRemove, onEdit }) {
      const tLang = React.useContext(LangContext);
      const [editing, setEditing] = useState(false);
      const [editText, setEditText] = useState(task.text);
      const [editFolder, setEditFolder] = useState(task.folder || "");
      const [editTime, setEditTime] = useState(task.alertTime === "NOW" ? "" : (task.alertTime || ""));
      const [showTimePicker, setShowTimePicker] = useState(false);

      const save = () => {
        if (editText.trim()) {
          onEdit(task.id, { text: editText.trim(), folder: editFolder.trim(), alertTime: editTime });
          setEditing(false);
        }
      };

      if (editing) return (
        <>
          {showTimePicker && <TimePickerWheel value={editTime} onChange={t => setEditTime(t)} onClose={() => setShowTimePicker(false)} />}

              style={{ width: "100%", border: `2px solid ${ROSE}`, borderRadius: 10, padding: "10px 12px", fontSize: 15, outline: "none", fontFamily: "inherit", color: DARK, marginBottom: 10, boxSizing: "border-box" }}

              />

    // ── Alarm Modal ───────────────────────────────────────────────────
    function AlarmModal({ task, onSnooze, onDone, purchased, selectedSound }) {
      const t = React.useContext(LangContext);
      const [stage, setStage] = React.useState("announce");

      // Use refs so the interval always reads the latest purchased/selectedSound
      const purchasedRef = React.useRef(purchased);
      const soundRef = React.useRef(selectedSound);
      useEffect(() => { purchasedRef.current = purchased; soundRef.current = selectedSound; }, [purchased, selectedSound]);

      const doPlay = () => {
        try {
          getCtx().resume().then(() => {
            if (purchasedRef.current) playZenSound(soundRef.current);
            else playAggressiveAlarm();
          });
        } catch (e) { }
      };

      // Sound fires immediately on mount — audio is already unlocked since user was using the app.
      // Repeats every 4s so it keeps ringing until snoozed or done.
      useEffect(() => {
        doPlay();
        const iv = setInterval(doPlay, 4000);
        return () => clearInterval(iv);
      }, []);

      // ── Stage 1: full-screen announcement (sound already playing) ─────
      if (stage === "announce") {
        return (
          <div style={{
            position: "fixed", inset: 0, zIndex: 2000, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
            background: `linear-gradient(135deg, ${purchased ? "#fffbeb, #fef3c7" : "#fce7ef, #fdf2f8"})`
          }}>
            <style>{`
          @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

      const [year, setYear] = useState(today.getFullYear());
      const [month, setMonth] = useState(today.getMonth());
      const [selected, setSelected] = useState(today.toISOString().split("T")[0]);
      const [showForm, setShowForm] = useState(false);
      const [showFox, setShowFox] = useState(false);
      const [intention, setIntention] = useState(() => {
        const saved = JSON.parse(localStorage.getItem("ccj_intentions") || "{}");
        return saved[new Date().toISOString().split("T")[0]] || "";
      });
      const [showIntention, setShowIntention] = useState(false);

      const saveIntention = (val) => {
        const saved = JSON.parse(localStorage.getItem("ccj_intentions") || "{}");
        saved[todayIntentionKey] = val;
        localStorage.setItem("ccj_intentions", JSON.stringify(saved));
        setIntention(val);
        setShowIntention(false);
      };
      const MONTHS = t.months;
      const DAYS = t.dayAbbr;
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const ds = d => `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
      const todayStr = today.toISOString().split("T")[0];
      const selectedTasks = tasks.filter(t => t.date === selected);
      const selLabel = new Date(selected + "T12:00:00").toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });
      const grouped = {};
      selectedTasks.forEach(t => { const k = t.folder || "General"; if (!grouped[k]) grouped[k] = []; grouped[k].push(t); });
      const addTask = form => {
        const newId = Date.now();
        setTasks(prev => [...prev, { id: newId, ...form, date: selected, done: false }]);
        setShowForm(false);
      };
      const toggleTask = id => {
        const t = tasks.find(t => t.id === id);
        if (t && !t.done) setCookies(1); else if (t && t.done) setCookies(-1);
        setTasks(prev => prev.map(t => t.id === id ? { ...t, done: !t.done } : t));
      };
      const removeTask = id => setTasks(prev => prev.filter(t => t.id !== id));
      const editTask = (id, changes) => setTasks(prev => prev.map(t => t.id === id ? { ...t, ...changes } : t));

      return (
        <div className="page-content" style={{ padding: "32px 28px", maxWidth: 1100, margin: "0 auto" }}>

            <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.3)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 999 }}>
              <div style={{ background: WHITE, borderRadius: 24, padding: "36px 32px", maxWidth: 400, width: "90%", textAlign: "center", boxShadow: "0 20px 60px rgba(0,0,0,0.2)" }}>

                <h3 style={{ margin: "0 0 12px", color: "#f97316", fontSize: 20, fontWeight: 800 }}>{t.fox_name}</h3>

                <h3 style={{ margin: "0 0 6px", fontSize: 22, fontWeight: 900, color: ROSE, textAlign: "center" }}>{t.intention_label}</h3>

                  onChange={e => setIntentionDraft(e.target.value)}

                  placeholder={t.intention_placeholder}
                  style={{ width: "100%", border: `2px solid ${ROSE}`, borderRadius: 12, padding: "14px 16px", fontSize: 16, outline: "none", fontFamily: "inherit", color: DARK, boxSizing: "border-box", marginBottom: 16, textAlign: "center", fontWeight: 600 }}
                />
                <div style={{ display: "flex", gap: 10 }}>

                  {intention && <button onClick={() => saveIntention("")} style={{ padding: "12px 16px", borderRadius: 12, border: "2px solid #fca5a5", background: "#fef2f2", cursor: "pointer", fontFamily: "inherit", fontSize: 13, fontWeight: 600, color: "#ef4444" }}>{t.intention_clear}</button>}
                  <button onClick={() => intentionDraft.trim() && saveIntention(intentionDraft.trim())} style={{ flex: 1, padding: "12px", borderRadius: 12, border: "none", background: intentionDraft.trim() ? ROSE : "#e5e7eb", cursor: intentionDraft.trim() ? "pointer" : "default", fontFamily: "inherit", fontSize: 14, fontWeight: 700, color: WHITE }}>{t.intention_save}</button>

                const d = i + 1; const dateStr = ds(d);

    // ── Unlock code verification (no server needed) ──────────────────
    // To generate a code for a buyer: open developer-tool.html privately
    // Each code is tied to the buyer's email — hard to guess or share
    async function verifyUnlockCode(email, code) {
      const secret = "ccj-golden-2024-🍪";
      const encoder = new TextEncoder();
      const keyData = encoder.encode(secret);
      const msgData = encoder.encode(email.trim().toLowerCase());
      const key = await crypto.subtle.importKey("raw", keyData, { name: "HMAC", hash: "SHA-256" }, false, ["sign"]);
      const sig = await crypto.subtle.sign("HMAC", key, msgData);
      const hex = Array.from(new Uint8Array(sig)).map(b => b.toString(16).padStart(2, "0")).join("");
      const expected = hex.slice(0, 8).toUpperCase();
      return code.trim().toUpperCase() === expected;
    }

    function DataBackupButton({ notifShowing, mobileOnly }) {
      const t = React.useContext(LangContext);
      const [open, setOpen] = React.useState(false);
      const [toast, setToast] = React.useState("");
      const fileRef = React.useRef(null);

      const KEYS = ["ccj_tasks", "ccj_cookies", "ccj_trophies", "ccj_purchased", "ccj_theme", "ccj_sound", "ccj_intentions", "ccj_snoozed", "ccj_fired", "ccj_lang", "ccj_unlocked", "ccj_splash"];

      // Close on outside click
      React.useEffect(() => {
        if (!open) return;
        const close = () => setOpen(false);
        setTimeout(() => document.addEventListener("mousedown", close), 0);
        return () => document.removeEventListener("mousedown", close);
      }, [open]);

      // Listen for desktop navbar save trigger
      React.useEffect(() => {
        const handler = () => setOpen(o => !o);
        document.addEventListener("ccj-save", handler);
        return () => document.removeEventListener("ccj-save", handler);
      }, []);

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(""), 2500); };

      const handleExport = () => {
        const data = {};
        KEYS.forEach(k => {
          try { const v = localStorage.getItem(k); if (v !== null) data[k] = JSON.parse(v); } catch { }
        });
        data._exported = new Date().toISOString();
        data._version = 1;
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `ccj-backup-${new Date().toISOString().slice(0, 10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        setOpen(false);
        showToast(t.export_done);
      };

      const handleImport = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (!data._version) throw new Error("invalid");
            KEYS.forEach(k => { if (k in data) localStorage.setItem(k, JSON.stringify(data[k])); });
            showToast(t.import_success);
            setTimeout(() => window.location.reload(), 1500);
          } catch {
            showToast(t.import_error);
          }
        };
        reader.readAsText(file);
        e.target.value = "";
        setOpen(false);
      };

      return (
        <>
          {/* Toast notification */}
          {toast && (
            <div style={{
              position: "fixed", bottom: "calc(80px + env(safe-area-inset-bottom))", left: "50%",
              transform: "translateX(-50%)", zIndex: 1000,
              background: toast === t.import_error ? "#ef4444" : "#22c55e",
              color: "#fff", padding: "10px 22px", borderRadius: 24,
              fontSize: 14, fontWeight: 700, boxShadow: "0 4px 20px rgba(0,0,0,0.2)",
              whiteSpace: "nowrap", pointerEvents: "none",
              animation: "fadeUp 0.3s ease-out",
            }}>{toast}</div>
          )}

          <input ref={fileRef} type="file" accept=".json" onChange={handleImport} style={{ display: "none" }} />

          {/* Floating folder button */}
          <div style={{ position: "fixed", left: 20, bottom: `calc(max(24px,env(safe-area-inset-bottom)) + ${notifShowing ? "122px" : "72px"})`, zIndex: 400, transition: "bottom 0.3s" }}
            onMouseDown={e => e.stopPropagation()}
          >
            {/* Dropdown menu — opens upward */}
            {open && (
              <div onMouseDown={() => setOpen(false)} style={{
                position: "fixed", inset: 0, zIndex: 800,
                background: "rgba(0,0,0,0.35)", backdropFilter: "blur(4px)",
                display: "flex", alignItems: "center", justifyContent: "center",
              }}>
                <div onMouseDown={e => e.stopPropagation()} style={{
                  background: WHITE, borderRadius: 24, padding: "28px 24px",
                  boxShadow: "0 20px 60px rgba(0,0,0,0.2)",
                  border: "1px solid #f0e6f0", minWidth: 300, maxWidth: 360,
                  animation: "fadeUp 0.25s cubic-bezier(0.34,1.56,0.64,1)",
                }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 20 }}>
                    <span style={{ fontSize: 22 }}>💾</span>
                    <h3 style={{ margin: 0, fontSize: 17, fontWeight: 800, color: DARK }}>{t.backup_title}</h3>
                    <button onClick={() => setOpen(false)} style={{ marginLeft: "auto", background: "none", border: "none", fontSize: 18, cursor: "pointer", color: GRAY, lineHeight: 1 }}>✕</button>
                  </div>
                  <p style={{ margin: "0 0 20px", fontSize: 13, color: GRAY, lineHeight: 1.5 }}>{t.backup_sub}</p>
                  <button onClick={handleExport} style={{
                    width: "100%", padding: "14px", border: "none", borderRadius: 14,
                    background: ROSE_LIGHT, cursor: "pointer", fontFamily: "inherit",
                    display: "flex", alignItems: "center", gap: 12, marginBottom: 10,
                    transition: "background 0.15s",
                  }}
                    onMouseEnter={e => e.currentTarget.style.background = ROSE_LIGHT.replace("fce", "fbd")}
                    onMouseLeave={e => e.currentTarget.style.background = ROSE_LIGHT}
                  >
                    <span style={{ fontSize: 22, width: 28, textAlign: "center" }}>⬇️</span>
                    <div style={{ textAlign: "left" }}>
                      <p style={{ margin: 0, fontSize: 14, fontWeight: 700, color: ROSE }}>{t.save_backup}</p>
                      <p style={{ margin: 0, fontSize: 12, color: GRAY }}>{t.save_backup_sub}</p>
                    </div>
                  </button>
                  <button onClick={() => { setOpen(false); setTimeout(() => fileRef.current?.click(), 100); }} style={{
                    width: "100%", padding: "14px", border: "none", borderRadius: 14,
                    background: "#fef9c3", cursor: "pointer", fontFamily: "inherit",
                    display: "flex", alignItems: "center", gap: 12,
                    transition: "background 0.15s",
                  }}
                    onMouseEnter={e => e.currentTarget.style.background = "#fef3c7"}
                    onMouseLeave={e => e.currentTarget.style.background = "#fef9c3"}
                  >
                    <span style={{ fontSize: 22, width: 28, textAlign: "center" }}>📂</span>
                    <div style={{ textAlign: "left" }}>
                      <p style={{ margin: 0, fontSize: 14, fontWeight: 700, color: "#92400e" }}>{t.load_backup}</p>
                      <p style={{ margin: 0, fontSize: 12, color: GRAY }}>{t.load_backup_sub}</p>
                    </div>
                  </button>
                  <div style={{ height: 1, background: "#f3f4f6", margin: "8px 0" }} />
                  <button onClick={() => { setOpen(false); if (window._appResetNotif) window._appResetNotif(); }} style={{
                    width: "100%", padding: "14px", border: "none", borderRadius: 14,
                    background: "#f0f9ff", cursor: "pointer", fontFamily: "inherit",
                    display: "flex", alignItems: "center", gap: 12,
                    transition: "background 0.15s",
                  }}
                    onMouseEnter={e => e.currentTarget.style.background = "#e0f2fe"}
                    onMouseLeave={e => e.currentTarget.style.background = "#f0f9ff"}
                  >
                    <span style={{ fontSize: 22, width: 28, textAlign: "center" }}>🔔</span>
                    <div style={{ textAlign: "left" }}>
                      <p style={{ margin: 0, fontSize: 14, fontWeight: 700, color: "#0369a1" }}>Reset notifications</p>
                      <p style={{ margin: 0, fontSize: 12, color: GRAY }}>Re-trigger the permission prompt</p>
                    </div>
                  </button>
                </div>
              </div>
            )}

            {/* The folder button itself — hidden on desktop, triggered via navbar event */}
            <button
              className="float-hide-desktop"
              onClick={() => setOpen(o => !o)}
              style={{
                background: open ? ROSE : ROSE_LIGHT,
                border: `2px solid ${ROSE}`,
                cursor: "pointer",
                borderRadius: 20,
                boxShadow: "0 2px 12px rgba(244,63,110,0.2)",
                padding: "11px 15px 12px",
                display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
                transition: "all 0.2s",
                minWidth: 56,
              }}
              onMouseEnter={e => { e.currentTarget.style.background = ROSE; e.currentTarget.style.transform = "scale(1.06)"; }}
              onMouseLeave={e => { e.currentTarget.style.background = ROSE_LIGHT; e.currentTarget.style.transform = "scale(1)"; }}
            >
              {/* Folder SVG */}
              <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
                <path d="M3 8C3 6.9 3.9 6 5 6H11L13 8H23C24.1 8 25 8.9 25 10V20C25 21.1 24.1 22 23 22H5C3.9 22 3 21.1 3 20V8Z" fill={open ? "rgba(255,255,255,0.95)" : ROSE} />
                <path d="M3 11H25V20C25 21.1 24.1 22 23 22H5C3.9 22 3 21.1 3 20V11Z" fill={open ? "rgba(255,255,255,0.6)" : "rgba(244,63,110,0.4)"} />
              </svg>
              <span style={{ fontSize: 11, fontWeight: 800, color: open ? "#fff" : ROSE, whiteSpace: "nowrap", letterSpacing: "0.3px" }}>{t.btn_save}</span>
            </button>
          </div>
        </>
      );
    }

    // ── APP ROOT ──────────────────────────────────────────────────────
    function App() {
      // Show "notifications on" reminder when returning to app
      useEffect(() => {
        let welcomeTimer;
        const handleVisibility = () => {
          if (document.visibilityState === "visible") {
            // Only show welcome back if user has already dealt with notification prompt
            const isOn = localStorage.getItem("ccj_notif_on") === "true";
            const isOff = localStorage.getItem("ccj_notif_off") === "true";
            if ((isOn || isOff) && splashGoneRef.current) {
              setWelcomeBack(true);
              welcomeTimer = setTimeout(() => setWelcomeBack(false), 6000);
            }
          }
        };
        document.addEventListener("visibilitychange", handleVisibility);
        return () => {
          document.removeEventListener("visibilitychange", handleVisibility);
          clearTimeout(welcomeTimer);
        };
      }, []);

      // Unlock AudioContext on the very first user interaction (mousedown fires before click)
      useEffect(() => {
        const unlock = () => {
          unlockAudio();
          document.removeEventListener('mousedown', unlock);
          document.removeEventListener('touchstart', unlock);
          document.removeEventListener('keydown', unlock);
        };
        document.addEventListener('mousedown', unlock);
        document.addEventListener('touchstart', unlock);
        document.addEventListener('keydown', unlock);
        return () => { document.removeEventListener('mousedown', unlock); document.removeEventListener('touchstart', unlock); document.removeEventListener('keydown', unlock); };
      }, []);
      // ── Persisted state — loaded from localStorage on first render ──
      const load = (key, fallback) => {
        try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : fallback; } catch { return fallback; }
      };
      const save = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch { } };

      const [lang, setLang] = useState(() => localStorage.getItem("ccj_lang") || "en");
      React.useEffect(() => { localStorage.setItem("ccj_lang", lang); }, [lang]);
      const t = TRANSLATIONS[lang] || TRANSLATIONS.en;
      const [page, setPage] = useState("today");
      const [showCoolDown, setShowCoolDown] = useState(false);
      const [nightMode, setNightMode] = useState(() => { const h = new Date().getHours(); return h >= 19 || h < 6; });
      useEffect(() => {
        const iv = setInterval(() => { const h = new Date().getHours(); setNightMode(h >= 19 || h < 6); }, 60000);
        return () => clearInterval(iv);
      }, []);

      const [showSplash, setShowSplash] = useState(true);
      const [splashGone, setSplashGone] = useState(false);
      const splashGoneRef = React.useRef(false);
      const dismissSplash = () => { setShowSplash(false); setTimeout(() => { setSplashGone(true); splashGoneRef.current = true; }, 500); };
      const [cookies, setCookiesRaw] = useState(() => load("ccj_cookies", 0));
      const [trophies, setTrophies] = useState(() => load("ccj_trophies", 0));
      const [showTrophy, setShowTrophy] = useState(false);
      const [purchased, setPurchased] = useState(() => load("ccj_purchased", false));
      const [selectedTheme, setSelectedTheme] = useState(() => load("ccj_theme", 1));
      const [selectedSound, setSelectedSound] = useState(() => load("ccj_sound", 0));
      const [tasks, setTasks] = useState(() => load("ccj_tasks", []));

      // ── Auto-save whenever state changes ──
      useEffect(() => { save("ccj_cookies", cookies); }, [cookies]);
      useEffect(() => { save("ccj_trophies", trophies); }, [trophies]);
      useEffect(() => { save("ccj_purchased", purchased); }, [purchased]);
      useEffect(() => { save("ccj_theme", selectedTheme); }, [selectedTheme]);
      useEffect(() => { save("ccj_sound", selectedSound); }, [selectedSound]);
      useEffect(() => { save("ccj_tasks", tasks); }, [tasks]);
      const [notifPerm, setNotifPerm] = useState(() => {
        // If user already dismissed or enabled — don't show the pink banner again
        if (localStorage.getItem("ccj_notif_off") === "true") return "off";
        if (localStorage.getItem("ccj_notif_on") === "true") return "granted";
        return "default"; // first time — show pink banner
